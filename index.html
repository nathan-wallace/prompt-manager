<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Manager Explorer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#prompt-results">Skip to prompt results</a>

    <header class="site-header">
      <div class="site-header__content">
        <h1>Prompt Manager Explorer</h1>
        <p>Browse, filter, and inspect reusable Markdown prompts.</p>
      </div>
    </header>

    <main class="layout" id="main-content">
      <aside class="panel sidebar" aria-label="Prompt filters">
        <h2 class="panel__title">Filters</h2>

        <form id="filters" class="filters" novalidate>
          <div class="field">
            <label for="search">Search prompts</label>
            <input
              id="search"
              name="search"
              type="search"
              placeholder="Search title, tags, category, or description"
              autocomplete="off"
            />
          </div>

          <div class="field">
            <label for="category">Category</label>
            <select id="category" name="category">
              <option value="">All categories</option>
            </select>
          </div>

          <div class="field">
            <label for="sort">Sort by</label>
            <select id="sort" name="sort">
              <option value="title-asc">Title (A–Z)</option>
              <option value="title-desc">Title (Z–A)</option>
              <option value="category-asc">Category (A–Z)</option>
              <option value="path-asc">Path (A–Z)</option>
            </select>
          </div>

          <button id="clear-filters" class="button button--secondary" type="button">Clear filters</button>
        </form>

        <p class="hint">Data source: <code>prompts/index.json</code></p>
      </aside>

      <section class="panel results" id="prompt-results" aria-labelledby="results-heading">
        <div class="results__header">
          <h2 id="results-heading" class="panel__title">Prompt list</h2>
          <p id="status" role="status" aria-live="polite"></p>
        </div>

        <ul id="prompt-list" class="prompt-list"></ul>
      </section>

      <section id="viewer" class="panel viewer" hidden aria-labelledby="viewer-title" tabindex="-1">
        <h2 id="viewer-title" class="panel__title">Prompt</h2>
        <p id="viewer-meta" class="meta"></p>
        <pre id="viewer-content"></pre>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
