<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASPA Prompt Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
    <a
      class="skip-link absolute left-[-9999px] top-2 z-50 rounded-md border-2 border-blue-600 bg-white px-3 py-2 text-blue-700 focus-visible:left-3"
      href="#prompt-results"
      >Skip to prompt results</a
    >

    <header class="app-header border-b border-slate-200 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-900/80">
      <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-6 sm:px-6 lg:flex-row lg:items-start lg:justify-between lg:px-8">
        <div>
          <h1 class="text-2xl font-bold tracking-tight sm:text-3xl">ASPA Prompt Explorer</h1>
          <p class="mt-2 max-w-3xl text-sm text-slate-600 dark:text-slate-300">
            Find reusable prompts quickly, compare options, and copy the one you need.
          </p>
        </div>
        <nav class="flex flex-wrap items-center gap-2 lg:justify-end" aria-label="Header menu">
          <a
            href="https://github.com/nathan-wallace-hhs/prompt-manager/issues/new"
            target="_blank"
            rel="noopener noreferrer"
            class="action-btn action-btn--muted"
            >Contribute a prompt</a
          >
          <label class="toggle-chip" for="show-favorites-only">
            <input id="show-favorites-only" name="show-favorites-only" type="checkbox" />
            <span>Saved prompts only</span>
          </label>
        </nav>
      </div>
    </header>

    <div class="utility-bar lg:hidden" aria-label="Quick filter controls">
      <div class="mx-auto max-w-7xl px-4 py-3 sm:px-6">
        <div class="rounded-2xl border border-slate-200 bg-white/95 p-3 shadow-sm backdrop-blur dark:border-slate-700 dark:bg-slate-900/95">
          <div class="grid gap-2 sm:grid-cols-2">
            <label class="control-field">
              <span class="control-label">Search prompts</span>
              <input
                id="search-quick"
                data-sync="search"
                type="search"
                placeholder="Try: interview, email, SQL"
                autocomplete="off"
                class="control-input"
              />
            </label>
            <label class="control-field">
              <span class="control-label">Browse by category</span>
              <select id="category-quick" data-sync="category" class="control-input">
                <option value="">All categories</option>
              </select>
            </label>
            <label class="control-field sm:col-span-2">
              <span class="control-label">Filter by tag</span>
              <select id="tag-quick" data-sync="tag" class="control-input">
                <option value="">All tags</option>
              </select>
            </label>
          </div>
          <div class="mt-2 flex flex-wrap items-center gap-2">
            <button id="clear-filters-quick" class="action-btn action-btn--muted" type="button">Reset filters</button>
          </div>
        </div>
      </div>
    </div>

    <main class="app-layout mx-auto grid w-full gap-4 px-4 sm:px-6 lg:px-0 lg:pr-8" id="main-content">
      <aside id="filters-panel" class="filters-panel" aria-label="Prompt filters">
        <div class="filters-panel-header">
          <h2 class="text-lg font-semibold">Find prompts</h2>
          <button
            id="toggle-filters-panel"
            class="action-btn action-btn--muted"
            type="button"
            aria-expanded="true"
            aria-controls="filters-panel-content"
          >
            <span class="filters-toggle-icon" aria-hidden="true">❮</span>
            <span class="filters-toggle-text"> Collapse</span>
          </button>
        </div>

        <div id="filters-panel-content">
          <form id="filters" class="mt-3 space-y-3" novalidate>
          <label for="search" class="control-field">
            <span class="control-label">Search prompts</span>
            <input
              id="search"
              name="search"
              type="search"
              placeholder="Search title, tags, category, or description"
              autocomplete="off"
              class="control-input"
            />
          </label>

          <label for="category" class="control-field">
            <span class="control-label">Browse by category</span>
            <select id="category" name="category" class="control-input">
              <option value="">All categories</option>
            </select>
          </label>

          <label for="tag" class="control-field">
            <span class="control-label">Filter by tag</span>
            <select id="tag" name="tag" class="control-input">
              <option value="">All tags</option>
            </select>
          </label>

          <label for="sort" class="control-field">
            <span class="control-label">Sort by</span>
            <select id="sort" name="sort" class="control-input">
              <option value="title-asc">Title (A–Z)</option>
              <option value="title-desc">Title (Z–A)</option>
              <option value="category-asc">Category (A–Z)</option>
              <option value="path-asc">Path (A–Z)</option>
            </select>
          </label>

            <button id="clear-filters" class="action-btn action-btn--muted w-full" type="button">Reset filters</button>
          </form>

          <p class="mt-4 text-xs text-slate-500 dark:text-slate-400">
            Tip: Press <kbd>↑</kbd> or <kbd>↓</kbd> in the prompt list, then Enter to open.
          </p>
          <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">Data source: <code>prompts/index.json</code></p>
        </div>
      </aside>

      <div class="app-shell py-5" id="workspace-panels">
        <section class="panel prompt-results-panel" id="prompt-results" aria-labelledby="results-heading">
          <div class="mb-3 flex flex-wrap items-baseline justify-between gap-2">
            <h2 id="results-heading" class="text-lg font-semibold">Available prompts</h2>
            <p id="status" class="text-xs text-slate-500 dark:text-slate-400" role="status" aria-live="polite"></p>
          </div>

          <div id="active-filters" class="active-filters" hidden aria-live="polite"></div>
          <ul id="prompt-list" class="results-list" aria-label="Prompt results list"></ul>
        </section>

        <section id="viewer" class="panel viewer-panel" hidden aria-labelledby="viewer-title" tabindex="-1">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h2 id="viewer-title" class="text-lg font-semibold">Prompt</h2>
              <p id="viewer-meta" class="mt-1 text-xs text-slate-500 dark:text-slate-400"></p>
            </div>
            <div class="flex flex-wrap items-center justify-end gap-2">
              <button id="copy-prompt" type="button" class="action-btn action-btn--muted" aria-label="Copy current prompt text">
                Copy prompt
              </button>
            </div>
          </div>
          <pre id="viewer-content" class="viewer-content"></pre>
        </section>
      </div>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
