<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Manager Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            boxShadow: {
              panel: '0 12px 28px rgba(15, 23, 42, 0.08)',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
    <a
      class="skip-link absolute left-[-9999px] top-2 z-50 rounded-md border-2 border-blue-600 bg-white px-3 py-2 text-blue-700 focus-visible:left-3"
      href="#prompt-results"
      >Skip to prompt results</a
    >

    <header class="border-b border-slate-200 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-900/80">
      <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <h1 class="text-2xl font-bold tracking-tight sm:text-3xl">Prompt Manager Explorer</h1>
        <p class="mt-2 max-w-3xl text-sm text-slate-600 dark:text-slate-300">
          Browse, filter, and inspect reusable Markdown prompts with a fast, searchable interface.
        </p>
      </div>
    </header>

    <main class="mx-auto grid max-w-7xl gap-4 px-4 py-5 sm:px-6 lg:grid-cols-12 lg:px-8" id="main-content">
      <aside
        class="rounded-2xl border border-slate-200 bg-white p-4 shadow-panel lg:col-span-3 dark:border-slate-800 dark:bg-slate-900"
        aria-label="Prompt filters"
      >
        <h2 class="mb-3 text-lg font-semibold">Filters</h2>

        <form id="filters" class="space-y-3" novalidate>
          <div>
            <label for="search" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Search prompts</label>
            <input
              id="search"
              name="search"
              type="search"
              placeholder="Search title, tags, category, or description"
              autocomplete="off"
              class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none ring-blue-500 placeholder:text-slate-400 focus:ring-2 dark:border-slate-700 dark:bg-slate-950"
            />
          </div>

          <div>
            <label for="category" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Category</label>
            <select
              id="category"
              name="category"
              class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none ring-blue-500 focus:ring-2 dark:border-slate-700 dark:bg-slate-950"
            >
              <option value="">All categories</option>
            </select>
          </div>

          <div>
            <label for="sort" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Sort by</label>
            <select
              id="sort"
              name="sort"
              class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none ring-blue-500 focus:ring-2 dark:border-slate-700 dark:bg-slate-950"
            >
              <option value="title-asc">Title (A–Z)</option>
              <option value="title-desc">Title (Z–A)</option>
              <option value="category-asc">Category (A–Z)</option>
              <option value="path-asc">Path (A–Z)</option>
            </select>
          </div>

          <div class="flex items-center gap-2">
            <input
              id="show-favorites-only"
              name="show-favorites-only"
              type="checkbox"
              class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-2 focus:ring-blue-500 dark:border-slate-700 dark:bg-slate-950"
            />
            <label for="show-favorites-only" class="text-sm font-medium text-slate-700 dark:text-slate-200"
              >Favorites only</label
            >
          </div>

          <button
            id="clear-filters"
            class="w-full rounded-lg border border-slate-300 bg-slate-100 px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700"
            type="button"
          >
            Clear filters
          </button>
        </form>

        <p class="mt-4 text-xs text-slate-500 dark:text-slate-400">Data source: <code>prompts/index.json</code></p>
      </aside>

      <section
        class="rounded-2xl border border-slate-200 bg-white p-4 shadow-panel lg:col-span-4 dark:border-slate-800 dark:bg-slate-900"
        id="prompt-results"
        aria-labelledby="results-heading"
      >
        <div class="mb-3 flex flex-wrap items-baseline justify-between gap-2">
          <h2 id="results-heading" class="text-lg font-semibold">Prompt list</h2>
          <p id="status" class="text-xs text-slate-500 dark:text-slate-400" role="status" aria-live="polite"></p>
        </div>

        <ul id="prompt-list" class="space-y-2"></ul>
      </section>

      <section
        id="viewer"
        class="rounded-2xl border border-slate-200 bg-white p-4 shadow-panel lg:col-span-5 dark:border-slate-800 dark:bg-slate-900"
        hidden
        aria-labelledby="viewer-title"
        tabindex="-1"
      >
        <h2 id="viewer-title" class="text-lg font-semibold">Prompt</h2>
        <p id="viewer-meta" class="mt-1 text-xs text-slate-500 dark:text-slate-400"></p>
        <pre
          id="viewer-content"
          class="mt-3 max-h-[65vh] overflow-auto rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm leading-relaxed text-slate-800 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100"
        ></pre>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
